<ui:composition
    template="/templates/staff-layout.xhtml"

    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:h="jakarta.faces.html"
    xmlns:f="jakarta.faces.core"
    xmlns:p="http://primefaces.org/ui">

    <!-- HEADER -->
    <ui:define name="header">
        <div class="flex align-items-center justify-content-between w-full px-3">

            <h3 class="m-0">
                Welcome, #{authBean.user.fullName} 👋
            </h3>

        </div>
    </ui:define>


    <!-- SIDEBAR MENU -->
    <ui:define name="menu">
        <ui:include src="/components/manager-menu.xhtml"/>
    </ui:define>


    <!-- CONTENT -->
    <ui:define name="content">
        <ui:include src="/components/customer-orders.xhtml"/>
    </ui:define>

</ui:composition>
