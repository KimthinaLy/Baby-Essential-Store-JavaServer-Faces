<ui:composition
    template="/templates/staff-layout.xhtml"

    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:h="jakarta.faces.html"
    xmlns:f="jakarta.faces.core"
    xmlns:p="http://primefaces.org/ui">

    <!-- HEADER -->
    <ui:define name="header">
        <div class="flex align-items-center justify-content-between w-full px-3">

            <h3 class="m-0">
                Welcome, #{authBean.user.fullName} 👋
            </h3>

        </div>
    </ui:define>


    <!-- SIDEBAR MENU -->
    <ui:define name="menu">
        <h:form>
            <p:menu styleClass="w-full border-none">
                <p:menuitem value="Manage Product"
                            icon="pi pi-box"
                            outcome="/views/manager/manage-products"/>

                <p:menuitem value="Manage Orders"
                            icon="pi pi-shopping-cart"
                            outcome="/views/employee/view-orders"/>

                <p:menuitem value="Manage Categories"
                            icon="pi pi-tags"
                            outcome="/views/manager/manage-categories"/>

                <p:menuitem value="Manage Occasions"
                            icon="pi pi-calendar"
                            outcome="/views/manager/manage-occasions"/>
                <p:separator/>
            </p:menu>

            <p:commandButton value="Logout"
                             action="#{authBean.logout}"
                             icon="pi pi-sign-out"
                             styleClass="ui-button-danger"/>
        </h:form>
    </ui:define>


    <!-- CONTENT -->
    <ui:define name="content">
        <div class="card crud-demo">
            <h:form id="form">
                <p:growl id="messages" showDetail="true" />

                <p:toolbar>
                    <p:toolbarGroup>
                        <p:commandButton value="New" 
                                         icon="pi pi-plus" 
                                         update="dt-products messages"  
                                         actionListener="#{productBean.openNew}"
                                         oncomplete="PF('manageProductDialog').show()"
                                         styleClass="ui-button-success" 
                                         style="margin-right: .5rem">
                            <p:resetInput target=":dialogs:manage-product-content" />
                        </p:commandButton>
                        <p:commandButton id="delete-products-button" 
                                         value="Delete"
                                         icon="pi pi-trash" 
                                         actionListener="#{productBean.deleteSelectedProducts}"
                                         styleClass="ui-button-danger" 
                                         disabled="#{empty productBean.selectedProducts}" 
                                         update="dt-products messages">
                            <p:confirm header="Confirmation" message="Delete the selected products?"
                                       icon="pi pi-exclamation-triangle" />
                        </p:commandButton>
                    </p:toolbarGroup>
                </p:toolbar>

                <p:dataTable id="dt-products" 
                             widgetVar="dtProducts" 
                             var="product" 
                             value="#{productBean.products}"
                             reflow="true" 
                             styleClass="products-table" 
                             selectionMode="multiple" 
                             selection="#{productBean.selectedProducts}"
                             rowKey="#{product.productId}" 
                             paginator="true" 
                             rows="10" 
                             selectionRowMode="add" 
                             paginatorPosition="bottom">
                    <f:facet name="header">
                        <div class="products-table-header">
                            <span style="font-weight: bold">PRODUCTS</span>
                            <span class="filter-container ui-input-icon-left"> <i class="pi pi-search"></i>
                                <p:inputText id="globalFilter" onkeyup="PrimeFaces.debounce(() => PF('dtProducts').filter())" placeholder="Search" />
                            </span>
                        </div>
                    </f:facet>

                    <p:ajax event="rowSelect" update=":form:delete-products-button" />
                    <p:ajax event="rowUnselect" update=":form:delete-products-button" />
                    <p:ajax event="rowSelectCheckbox" update=":form:delete-products-button" />
                    <p:ajax event="rowUnselectCheckbox" update=":form:delete-products-button" />
                    <p:ajax event="toggleSelect" update=":form:delete-products-button" />

                    <p:column selectionBox="true" exportable="false"></p:column>

                    <p:column headerText="Id" sortBy="#{product.productId}" filterBy="#{product.productId}">
                        <h:outputText value="#{product.productId}" />
                    </p:column>
                    <p:column headerText="Name" sortBy="#{product.name}" filterBy="#{product.name}">
                        <h:outputText value="#{product.name}" />
                    </p:column>
                    <p:column headerText="Image" exportable="false">
                        <h:graphicImage value="#{product.productImage}"  styleClass="product-image" style="width:5rem;height:5rem"/>
                    </p:column>
                    <p:column headerText="Price" sortBy="#{product.price}">
                        <h:outputText value="#{product.price}" style="font-weight: 700">
                            <f:convertNumber currencySymbol="$" type="currency" />
                        </h:outputText>
                    </p:column>
                    <p:column headerText="Stock" sortBy="#{product.quantityOnHand}">
                        <h:outputText value="#{product.quantityOnHand}" />
                    </p:column>
                    <p:column headerText="Category" sortBy="#{product.categoryName}" filterBy="#{product.categoryName}">
                        <h:outputText value="#{product.categoryName}" />
                    </p:column>
                    <p:column headerText="Occasion" sortBy="#{product.occasionNames}" filterBy="#{product.occasionNames}">
                        <h:outputText value="#{product.occasionNames}" />
                    </p:column>

                    <p:column exportable="false" ariaHeaderText="Actions">
                        <p:commandButton icon="pi pi-pencil" 
                                         update=":dialogs:manage-product-content"
                                         oncomplete="PF('manageProductDialog').show()"
                                         styleClass="edit-button rounded-button ui-button-success" process="@this">
                            <f:setPropertyActionListener value="#{product}" target="#{productBean.product}" />
                            <p:resetInput target=":dialogs:manage-product-content" />
                        </p:commandButton>
                        <p:commandButton styleClass="ui-button-warning rounded-button" icon="pi pi-trash"
                                         process="@this"
                                         oncomplete="PF('deleteProductDialog').show()">
                            <f:setPropertyActionListener value="#{product}" target="#{productBean.product}" />
                        </p:commandButton>
                    </p:column>

                </p:dataTable>
            </h:form>

            <h:form id="dialogs">
                <p:dialog header="Product Details" showEffect="fade" modal="true" widgetVar="manageProductDialog"
                          responsive="true">
                    <p:outputPanel id="manage-product-content" class="ui-fluid">
                        <p:outputPanel rendered="#{not empty productBean.product}">
                            <h:graphicImage value="#{productBean.product.productImage}"  styleClass="product-image" 
                                            rendered="#{not empty productBean.product.productImage}" 
                                            style="width:5rem;height:5rem"/>
                            <div class="field">
                                <p:outputLabel for="name">Name</p:outputLabel>
                                <p:inputText id="name" value="#{productBean.product.name}" required="true" />
                            </div>
                            <div class="field">
                                <p:outputLabel for="description">Description</p:outputLabel>
                                <p:inputTextarea id="description" value="#{productBean.product.description}" />
                            </div>
                            <div class="field">
                                <p:outputLabel for="category" value="Category"/>

                                <p:selectOneMenu id="category"
                                                 value="#{productBean.product.categoryId}"
                                                 style="width:100%">

                                    <f:selectItem itemLabel="Select Category" itemValue="" noSelectionOption="true"/>

                                    <f:selectItems value="#{productBean.categories}"
                                                   var="c"
                                                   itemLabel="#{c.categoryName}"
                                                   itemValue="#{c.categoryId}" />

                                </p:selectOneMenu>
                            </div>
                            <div class="formgrid grid">
                                <div class="field col">
                                    <p:outputLabel for="price">Price</p:outputLabel>
                                    <p:inputNumber id="price" value="#{productBean.product.price}" symbol=" USD"
                                                   symbolPosition="s" decimalSeparator="." thousandSeparator="," />
                                </div>
                                <div class="field col">
                                    <p:outputLabel for="quantity">Quantity</p:outputLabel>
                                    <p:spinner id="quantity" min="0" value="#{productBean.product.quantityOnHand}" />
                                </div>
                            </div>
                        </p:outputPanel>
                    </p:outputPanel>

                    <f:facet name="footer">
                        <p:commandButton value="Save" icon="pi pi-check" actionListener="#{productBean.save}"
                                         update=":form:dt-products messages manage-product-content" process="manage-product-content @this" 
                                         oncomplete="PF('manageProductDialog').hide()"/>
                        <p:commandButton value="Cancel" icon="pi pi-times" onclick="PF('manageProductDialog').hide()"
                                         class="ui-button-secondary" type="button" />
                    </f:facet>
                </p:dialog>

                <p:confirmDialog widgetVar="deleteProductDialog" showEffect="fade" width="300"
                                 message="Delete the product?" header="Confirm" severity="warn">
                    <p:commandButton value="Yes" icon="pi pi-check" actionListener="#{productBean.delete(productBean.product.productId)}"
                                     process="@this" update=":form:dt-products messages"
                                     oncomplete="PF('deleteProductDialog').hide()" />
                    <p:commandButton value="No" type="button" styleClass="ui-button-secondary" icon="pi pi-times"
                                     onclick="PF('deleteProductDialog').hide()" />
                </p:confirmDialog>

                <p:confirmDialog global="true" showEffect="fade" width="300">
                    <p:commandButton value="Yes" type="button" styleClass="ui-confirmdialog-yes" icon="pi pi-check" />
                    <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-secondary"
                                     icon="pi pi-times" />
                </p:confirmDialog>
            </h:form>
        </div>

    </ui:define>

</ui:composition>
