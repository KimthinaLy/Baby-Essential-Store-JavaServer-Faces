<ui:composition
    template="/templates/layout.xhtml"

    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:h="jakarta.faces.html"
    xmlns:f="jakarta.faces.core"
    xmlns:p="http://primefaces.org/ui">

    <ui:define name="content">
        <div class="px-3 min-h-screen" style="padding-top: 10vh">

            <h2 class="text-primary text-center mb-4">Order History</h2>
            <h:form>
            <p:dataTable value="#{orderBean.orders}" var="o" rowIndexVar="i"
                         styleClass="p-datatable-striped">

                <!-- Order Number -->
                <p:column headerText="No." style="width:60px">
                    #{i + 1}
                </p:column>

                <!-- Order ID -->
                <p:column headerText="Order ID">
                    #{o.orderId}
                </p:column>

                <!-- Total Items -->
                <p:column headerText="Total Price">
                    $#{o.totalAmount}
                </p:column>

                <!-- Date -->
                <p:column headerText="Order Date">
                    <h:outputText value="#{o.orderDate}">
                        <f:convertDateTime pattern="dd/MM/yyyy HH:mm"/>
                    </h:outputText>
                </p:column>

                <!-- Order Status -->
                <p:column headerText="Order Status">
                    <p:tag value="#{o.orderStatus}"
                           severity="#{o.orderStatus eq 'Pending' ? 'warning' :
                                       o.orderStatus eq 'Completed' ? 'success' : 'info'}"/>
                </p:column>

                <!-- Payment Status -->
                <p:column headerText="Payment Status">
                    <p:tag value="#{o.paymentStatus}"
                           severity="#{o.paymentStatus eq 'Paid' ? 'success' : 'danger'}"/>
                </p:column>

                <!-- Actions -->
                <p:column headerText="Action" style="width:180px">

                    <!-- View Items -->
                    <p:commandButton icon="pi pi-eye"
                                     value="View"
                                     styleClass="p-button-info p-button-sm mr-2 mb-3"
                                     action="#{orderBean.viewOrderItems(o.orderId)}"/>

                    <!-- Delete Order -->
                    <p:commandButton icon="pi pi-trash"
                                     value="Delete"
                                     styleClass="p-button-danger p-button-sm"
                                     disabled="#{o.orderStatus ne 'Completed'}"
                                     action="#{orderBean.deleteOrder(o.orderId)}">

                    <p:confirm header="Confirm Delete"
                               message="Are you sure you want to delete this order?"
                               icon="pi pi-exclamation-triangle"/>

                    </p:commandButton>
                </p:column>
            </p:dataTable>
                </h:form>
        </div>
        <p:confirmDialog global="true" showEffect="fade" hideEffect="fade"/>
    </ui:define>
</ui:composition>
