<ui:composition
    template="/templates/staff-layout.xhtml"

    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:h="jakarta.faces.html"
    xmlns:f="jakarta.faces.core"
    xmlns:p="http://primefaces.org/ui">

    <!-- HEADER -->
    <ui:define name="header">
        <div class="flex align-items-center justify-content-between w-full px-3">

            <h3 class="m-0">
                Welcome, #{authBean.user.fullName} 👋
            </h3>

        </div>
    </ui:define>


    <!-- SIDEBAR MENU -->
    <ui:define name="menu">
        <h:form>
            <p:menu styleClass="w-full border-none">
                <p:menuitem value="Dashboard"
                            icon="pi pi-users"
                            outcome="/views/admin/dashboard"/>

                <p:menuitem value="Manage Users"
                            icon="pi pi-users"
                            outcome="/views/admin/manage-users"/>
            </p:menu>

            <p:commandButton value="Logout"
                             action="#{authBean.logout}"
                             icon="pi pi-sign-out"
                             styleClass="ui-button-danger"/>
        </h:form>
    </ui:define>


    <!-- CONTENT -->
    <ui:define name="content">
        <div class="card crud-demo">
            <h:form id="form">
                <p:growl id="messages" showDetail="true" />

                <p:toolbar>
                    <p:toolbarGroup>
                        <p:commandButton value="New" 
                                         icon="pi pi-plus" 
                                         update="dt-users messages :dialogs:manage-user-content"  
                                         actionListener="#{userBean.openNew}"
                                         oncomplete="PF('manageUserDialog').show()"
                                         styleClass="ui-button-success" 
                                         style="margin-right: .5rem">
                            <p:resetInput target=":dialogs:manage-user-content" />
                        </p:commandButton>
                        <p:commandButton id="delete-products-button" 
                                         value="Delete"
                                         icon="pi pi-trash" 
                                         actionListener="#{userBean.deleteSelectedUsers}"
                                         styleClass="ui-button-danger" 
                                         disabled="#{empty userBean.selectedUsers}" 
                                         update="dt-users messages">
                            <p:confirm header="Confirmation" message="Delete the selected users?"
                                       icon="pi pi-exclamation-triangle" />
                        </p:commandButton>
                    </p:toolbarGroup>
                </p:toolbar>

                <p:dataTable id="dt-users" 
                             widgetVar="dtProducts" 
                             var="user" 
                             value="#{userBean.users}"
                             reflow="true" 
                             styleClass="products-table" 
                             selectionMode="multiple" 
                             selection="#{userBean.selectedUsers}"
                             rowKey="#{user.userId}" 
                             paginator="true" 
                             rows="10" 
                             selectionRowMode="add" 
                             paginatorPosition="bottom">
                    <f:facet name="header">
                        <div class="products-table-header">
                            <span style="font-weight: bold">Users</span>
                            <span class="filter-container ui-input-icon-left"> <i class="pi pi-search"></i>
                                <p:inputText id="globalFilter" onkeyup="PrimeFaces.debounce(() => PF('dtProducts').filter())" placeholder="Search" />
                            </span>
                        </div>
                    </f:facet>

                    <p:ajax event="rowSelect" update=":form:delete-products-button" />
                    <p:ajax event="rowUnselect" update=":form:delete-products-button" />
                    <p:ajax event="rowSelectCheckbox" update=":form:delete-products-button" />
                    <p:ajax event="rowUnselectCheckbox" update=":form:delete-products-button" />
                    <p:ajax event="toggleSelect" update=":form:delete-products-button" />

                    <p:column selectionBox="true" exportable="false"></p:column>

                    <p:column headerText="User Id" sortBy="#{user.userId}" filterBy="#{user.userId}">
                        <h:outputText value="#{user.userId}" />
                    </p:column>
                    <p:column headerText="Full Name" sortBy="#{user.fullName}" filterBy="#{user.fullName}">
                        <h:outputText value="#{user.fullName}" />
                    </p:column>
                    <p:column headerText="Email">
                        <h:outputText value="#{user.email}" />
                    </p:column>
                    <p:column headerText="Phone">
                        <h:outputText value="#{user.phone}"/>
                    </p:column>
                    <p:column headerText="Role" sortBy="#{user.role}" filterBy="#{user.role}">
                        <h:outputText value="#{user.role}" />
                    </p:column>

                    <p:column headerText="Address">
                        <h:outputText value="#{addressBean.getAddressLineByUserId(user.userId)}" />
                    </p:column>

                    <p:column exportable="false" ariaHeaderText="Actions">
                        <p:commandButton icon="pi pi-pencil" 
                                         update=":dialogs:manage-user-content"
                                         oncomplete="PF('manageUserDialog').show()"
                                         styleClass="edit-button rounded-button ui-button-success" process="@this">
                            <f:setPropertyActionListener value="#{user}" target="#{userBean.user}" />
                            <p:resetInput target=":dialogs:manage-user-content" />
                        </p:commandButton>
                        <p:commandButton styleClass="ui-button-warning rounded-button" icon="pi pi-trash"
                                         process="@this"
                                         oncomplete="PF('deleteProductDialog').show()">
                            <f:setPropertyActionListener value="#{user}" target="#{userBean.user}" />
                        </p:commandButton>
                    </p:column>

                </p:dataTable>
            </h:form>

            <h:form id="dialogs">
                <p:dialog header="User Infomation" showEffect="fade" modal="true" widgetVar="manageUserDialog"
                          responsive="true"  style="max-height:500px; overflow-y:auto;">
                    <p:outputPanel id="manage-user-content" class="ui-fluid">
                        <p:outputPanel rendered="#{not empty userBean.user}">
                            <div class="field">
                                <p:outputLabel for="name">Full Name</p:outputLabel>
                                <p:inputText id="name" value="#{userBean.user.fullName}" required="true" />
                            </div>
                            <div class="field">
                                <p:outputLabel for="email">Email</p:outputLabel>
                                <p:inputText id="email" value="#{userBean.user.email}" required="true" />
                            </div>
                            <div class="field">
                                <p:outputLabel for="pw">Password</p:outputLabel>
                                <p:inputText id="pw" value="#{userBean.user.password}" required="true" />
                            </div>
                            <div class="field">
                                <p:outputLabel for="phone">Phone</p:outputLabel>
                                <p:inputMask id="phone" value="#{userBean.user.phone}"  mask="(999) 999-9999" validateMask="true" required="true"/>
                            </div>
                            <div class="field">
                                <p:outputLabel for="role">Role</p:outputLabel>
                                <p:inputText id="role" value="#{userBean.user.role}"/>
                            </div>

                            <div class="formgrid grid">
                                <div class="field col">
                                    <p:outputLabel for="receiverName">Receiver Name</p:outputLabel>
                                    <p:inputText id="receiverName" value="#{userBean.address.receiverName}"/>
                                </div>
                                <div class="field col">
                                    <p:outputLabel for="receiverPhone">Receiver Phone</p:outputLabel>
                                    <p:inputMask id="receiverPhone" value="#{userBean.address.phone}"  mask="(999) 999-9999" validateMask="true" required="true"/>
                                </div>
                            </div>

                            <div class="formgrid grid">
                                <div class="field col">
                                    <p:outputLabel for="street">Street</p:outputLabel>
                                    <p:inputText id="street" value="#{userBean.address.street}"/>
                                </div>
                                <div class="field col">
                                    <p:outputLabel for="city">City</p:outputLabel>
                                    <p:inputText id="city" value="#{userBean.address.city}"/>
                                </div>
                            </div>

                            <div class="formgrid grid">
                                <div class="field col">
                                    <p:outputLabel for="province">Province</p:outputLabel>
                                    <p:inputText id="province" value="#{userBean.address.province}"/>
                                </div>
                                <div class="field col">
                                    <p:outputLabel for="postalCode">Postal Code</p:outputLabel>
                                    <p:inputText id="postalCode" value="#{userBean.address.postalCode}"/>
                                </div>
                            </div>
                        </p:outputPanel>
                    </p:outputPanel>

                    <f:facet name="footer">
                        <p:commandButton value="Save" icon="pi pi-check" actionListener="#{userBean.save}"
                                         update=":form:dt-users messages manage-user-content" process="manage-user-content @this" 
                                         oncomplete="PF('manageUserDialog').hide()"/>
                        <p:commandButton value="Cancel" icon="pi pi-times" onclick="PF('manageUserDialog').hide()"
                                         class="ui-button-secondary" type="button" />
                    </f:facet>
                </p:dialog>

                <p:confirmDialog widgetVar="deleteProductDialog" showEffect="fade" width="300"
                                 message="Delete this user?" header="Confirm" severity="warn">
                    <p:commandButton value="Yes" icon="pi pi-check" actionListener="#{userBean.deleteUser(userBean.user.userId)}"
                                     process="@this" update=":form:dt-users messages"
                                     oncomplete="PF('deleteProductDialog').hide()" />
                    <p:commandButton value="No" type="button" styleClass="ui-button-secondary" icon="pi pi-times"
                                     onclick="PF('deleteProductDialog').hide()" />
                </p:confirmDialog>

                <p:confirmDialog global="true" showEffect="fade" width="300">
                    <p:commandButton value="Yes" type="button" styleClass="ui-confirmdialog-yes" icon="pi pi-check" />
                    <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-secondary"
                                     icon="pi pi-times" />
                </p:confirmDialog>
            </h:form>
        </div>

    </ui:define>

</ui:composition>
