<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui">

    <div class="flex align-items-center justify-content-between px-5 py-1 shadow-2 bg-white z-5 fixed right-0 left-0 top-0">
        <!-- LEFT SIDE -->
        <div class="flex align-items-center gap-4">

            <p:link outcome="/index" styleClass="flex align-items-center">
                <p:graphicImage name="logo2.png" height="60" library="images"/>
                <span class="text-primary text-xl font-bold white-space-nowrap overflow-hidden text-overflow-ellipsis">Baby Essential</span>
            </p:link>
            <p:link outcome="/index" styleClass="flex align-items-center gap-2 no-underline text-color">
                <i class="pi pi-home text-primary"></i>
                <span class="text-primary">Home</span>
            </p:link>
            <p:link outcome="/views/customer/product"
                    styleClass="flex align-items-center gap-2 no-underline text-color">
                <i class="pi pi-shopping-bag text-primary"></i>
                <span class="text-primary">Products</span>
            </p:link>

        </div>

        <!-- CENTER SEARCH BAR -->
        <div class="flex align-items-center w-4">
            <h:form class="flex align-items-center w-full">
                <div class="ui-inputgroup w-full">
                    <div class="ui-inputgroup-addon flex align-items-center justify-content-center bg-white"><i class="pi pi-search text-primary"></i></div>
                    <p:inputText placeholder="Search product by name..." styleClass="w-full" value="#{productBean.searchKeyword}">
                        <p:ajax event="keyup" update="productGrid" listener="#{productBean.loadSearchProducts}"/>
                    </p:inputText>
                </div>
            </h:form>
        </div>

        <!-- RIGHT SIDE -->
        <div class="flex align-items-center gap-3">

            <!-- CART -->
            <p:link outcome="/views/customer/cart"
                    styleClass="flex align-items-center gap-2 no-underline text-color">
                <i class="pi pi-shopping-cart text-primary"></i>
                <span class="text-primary">Cart</span>
            </p:link>

            <p:link outcome="/views/customer/order-history">
                <p:button value="Your Orders" icon="pi pi-shopping-bag"/>
            </p:link>


            <!-- IF USER LOGGED IN -->
            <h:form styleClass="flex align-items-center gap-4">
                <h:panelGroup rendered="#{not empty sessionScope.user}">
                    <p:link outcome="/views/profile/profile">
                        <p:button value="Profile" icon="pi pi-user"/>
                    </p:link>

                    <p:commandButton value="Logout"
                                     action="#{authBean.logout}"
                                     icon="pi pi-sign-out"
                                     styleClass="p-button-text"/>

                </h:panelGroup>


                <!-- IF USER NOT LOGGED IN -->
                <h:panelGroup rendered="#{empty sessionScope.user}">

                    <p:link outcome="/views/auth/register">
                        <p:button value="Register" icon="pi pi-user-plus"/>
                    </p:link>

                    <p:link outcome="/views/auth/login">
                        <p:button value="Login" icon="pi pi-sign-in"/>
                    </p:link>
                </h:panelGroup>
            </h:form>
        </div>
    </div>
</ui:composition>
