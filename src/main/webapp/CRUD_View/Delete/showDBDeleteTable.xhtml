<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:fn="http://java.sun.com/jsp/jstl/functions">
    <h:head>
        <title>Product Database</title>
    </h:head>
    <h:body>
        <h:link value="Back to Home" outcome="/CRUD_View/CRUD_Menu"/> <br/><br/>
        <h:link value="View Products in Database" outcome="/CRUD_View/Read/ViewDBTable"/> <br/><br/>
        
        <h:form>
            <h:dataTable value="#{productBean.list}" var="p" border="1">
                <h:column>
                    <f:facet name="header">ID</f:facet>
                    #{p.productId}
                </h:column>
                <h:column>
                    <f:facet name="header">Name</f:facet>
                    #{p.name}
                </h:column>
                <h:column>
                    <f:facet name="header">Price</f:facet>
                    #{p.price}
                </h:column>
                <h:column>
                    <f:facet name="header">Qty On Hand</f:facet>
                    #{p.quantityOnHand}
                </h:column>
                <h:column>
                    <f:facet name="header">- Remove Product</f:facet>
                    <h:commandLink value="Remove" action="#{productBean.deproductIdte(p.id)}" onclick="confirmDeletproductId'#{p.id}',
                                    '#{fn:escapeXml(p.name)}',
                                    '#{p.price}',
                                    '#{p.quantityOnHand}'); "/>
                </h:column>
            </h:dataTable>
        </h:form>
        
        <script>
            function confirmDelete(id, name, price, stock) {
                const message =
                        "Please confirm the product information:\n\n" +
                        "Product ID: " + id + "\n" +
                        "Product Name: " + name + "\n" +
                        "Price: " + price + "\n" +
                        "Stock Quantity: " + stock + "\n\n" +
                        "Are you sure you want to delete this product?";
                return confirm(message);
            }
        </script>
    </h:body>
</html>
