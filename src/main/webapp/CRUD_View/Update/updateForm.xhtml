<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">

    <f:metadata>
        <f:viewAction action="#{productBean.getProductById}" />
    </f:metadata>
    <h:head>
        <title>Product Information</title>
    </h:head>
    <h:body>
        <h:panelGroup rendered="#{not empty productBean.product}">
            <h:form onsubmit="return confirmUpdate(#{productBean.product.id})">            
                <fieldset>
                    <legend>Product Information</legend>


                    <h:outputLabel for="product_id" value="Product"/>
                    <h:outputText value="#{productBean.product.id}" />
                    <h:inputHidden id="product_id" value="#{productBean.product.id}"/>
                    <br/><br/>

                    <h:outputLabel for="name" value="Product Name"/>
                    <h:inputText id="name" value="#{productBean.product.name}"/>
                    <br/><br/>

                    <h:outputLabel for="price" value="Price"/>
                    <h:inputText id="price" value="#{productBean.product.price}"/>
                    <br/><br/>

                    <h:outputLabel for="qty_on_hand" value="Stock Quantity"/>
                    <h:inputText id="qty_on_hand" value="#{productBean.product.quantityOnHand}"/>
                    <br/><br/>
                    
                    <h:commandButton value="Update" action="#{productBean.update()}"/>
                </fieldset>
            </h:form>
        </h:panelGroup>

        <script>
            function confirmUpdate(product_id) {
                const productId = product_id;
                document.querySelector("[id$='name']").value;
                document.querySelector("[id$='price']").value;
                document.querySelector("[id$='qty_on_hand']").value;
                const message =
                        "Please confirm the product information:\n\n" +
                        "Product ID: " + productId + "\n" +
                        "Product Name: " + name + "\n" +
                        "Price: " + price + "\n" +
                        "Stock Quantity: " + qty_on_hand + "\n\n" +
                        "Do you want to update this product?";
                return confirm(message);
            }
        </script>
    </h:body>
</html>
