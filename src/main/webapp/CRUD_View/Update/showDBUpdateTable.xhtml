<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
    <h:head>
        <title>Update Database</title>
    </h:head>
    <h:body>
        <h:link value="Back to Home" outcome="/CRUD_View/CRUD_Menu"/> <br/><br/>
        <h:link value="View Products in Database" outcome="/CRUD_View/Read/ViewDBTable"/> <br/><br/>
        
        <h:form>
            <h:dataTable value="#{productBean.list}" var="p" border="1">
                <h:column>
                    <f:facet name="header">ID</f:facet>
                    #{p.productId}
                </h:column>
                <h:column>
                    <f:facet name="header">Name</f:facet>
                    #{p.name}
                </h:column>
                <h:column>
                    <f:facet name="header">Price</f:facet>
                    #{p.price}
                </h:column>
                <h:column>
                    <f:facet name="header">Qty On Hand</f:facet>
                    #{p.quantityOnHand}
                </h:column>
                <h:column>
                    <f:facet name="header">Update Product</f:facet>
                    <!-- comment
                    <h:link value="Update" outcome="/CRUD_View/Update/updateForm">
                        <f:param name="id" valuproductId"#{p.id}"/>
                    </h:link> -->
                </h:column>
            </h:dataTable>
        </h:form>
    </h:body>
</html>
